<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#0a0a0f;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0f;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#111118;border:1px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;">
          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#00d4ff 0%,#7c3aed 100%);padding:32px 40px;text-align:center;">
              <h1 style="margin:0;color:#0a0a0f;font-size:24px;font-weight:700;">Pesan Baru dari Portfolio</h1>
              <p style="margin:8px 0 0;color:rgba(10,10,15,0.7);font-size:14px;">Website Portfolio Hanafi</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:32px 40px;">
              <!-- Info Card -->
              <table width="100%" cellpadding="0" cellspacing="0" style="background-color:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;margin-bottom:24px;">
                <tr>
                  <td style="padding:24px;">
                    <table width="100%" cellpadding="0" cellspacing="0">
                      <tr>
                        <td style="padding-bottom:16px;">
                          <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                              <td width="100" style="color:#00d4ff;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:4px 0;">Nama</td>
                              <td style="color:#ffffff;font-size:15px;padding:4px 0;">{{nama}}</td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                      <tr>
                        <td style="border-top:1px solid rgba(255,255,255,0.06);padding:12px 0 16px;">
                          <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                              <td width="100" style="color:#00d4ff;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:4px 0;">Email</td>
                              <td style="color:#ffffff;font-size:15px;padding:4px 0;">{{email}}</td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                      <tr>
                        <td style="border-top:1px solid rgba(255,255,255,0.06);padding:4px 0;">
                          <table width="100%" cellpadding="0" cellspacing="0">
                            <tr>
                              <td width="100" style="color:#00d4ff;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;padding:4px 0;">Layanan</td>
                              <td style="color:#ffffff;font-size:15px;padding:4px 0;">{{layanan}}</td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>

              <!-- Message Card -->
              <table width="100%" cellpadding="0" cellspacing="0" style="background-color:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.15);border-radius:12px;">
                <tr>
                  <td style="padding:24px;">
                    <p style="margin:0 0 12px;color:#00d4ff;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Pesan</p>
                    <p style="margin:0;color:#d1d5db;font-size:15px;line-height:1.7;white-space:pre-wrap;">{{pesan}}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px;border-top:1px solid rgba(255,255,255,0.06);">
              <p style="margin:0;color:rgba(255,255,255,0.3);font-size:12px;text-align:center;">
                Dikirim melalui form kontak portfolio &bull; {{year}}
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
